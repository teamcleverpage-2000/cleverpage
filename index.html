<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleverPage — Slim online. Snel live.</title>
  <meta name="description" content="CleverPage bouwt professionele websites voor MKB en ZZP. Snel, doordacht en betaalbaar — binnen een week live." />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <link rel="canonical" href="https://cleverpage.nl/" />
  <meta property="og:title" content="CleverPage — Slim online. Snel live." />
  <meta property="og:description" content="Professionele websites voor MKB en ZZP — snel, doordacht en betaalbaar." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://cleverpage.nl/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#5a8a6a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-pagina="index">
  <a class="skip-link" href="#main-content">Spring naar de inhoud</a>
  <header class="nav" id="nav"></header>

  <main id="main-content">
  <!-- HERO -->
  <section class="home-hero">
    <div class="wrap">
      <p class="eyebrow" id="eyebrow"></p>
      <h1 id="hero-titel"></h1>
      <p class="lead" id="hero-lead"></p>
      <div class="knoppen" id="hero-knoppen"></div>
      <div class="stats-balk" id="stats-balk"></div>
    </div>
  </section>

  <!-- USP -->
  <section class="sectie">
    <div class="wrap">
      <div class="sectie-kop">
        <h2>Waarom CleverPage?</h2>
        <p class="sectie-intro">Wij bouwen geen templates van de plank. Elke site is doordacht, snel en ontworpen om te converteren.</p>
      </div>
      <div class="usp-grid" id="usp-grid"></div>
    </div>
  </section>

  <!-- HOE HET WERKT -->
  <section class="sectie bg-groen">
    <div class="wrap">
      <div class="sectie-kop">
        <h2 id="werkwijze-titel"></h2>
        <p class="sectie-intro" id="werkwijze-intro"></p>
      </div>
      <div class="tijdlijn" id="tijdlijn"></div>
    </div>
  </section>

  <!-- PORTFOLIO PREVIEW -->
  <section class="sectie">
    <div class="wrap">
      <div class="sectie-kop">
        <h2 id="portfolio-preview-titel"></h2>
        <p class="sectie-intro" id="portfolio-preview-intro"></p>
      </div>
      <div class="portfolio-grid" id="portfolio-grid"></div>
      <div style="margin-top:36px">
        <a href="portfolio.html" class="btn btn-ghost">Bekijk alle projecten →</a>
      </div>
    </div>
  </section>

  <!-- CTA BALK -->
  <section class="cta-balk" id="cta-balk"></section>

  <footer class="footer" id="footer"></footer>

  </main>

  <script defer src="config.js"></script>
  <script defer src="nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const d = C.home;

      document.getElementById('eyebrow').textContent         = d.heroEyebrow;
      document.getElementById('hero-titel').innerHTML        = d.heroTitel;
      document.getElementById('hero-lead').textContent       = d.heroSubtitel;

      // Knoppen
      document.getElementById('hero-knoppen').innerHTML =
        '<a href="' + d.heroCta.primairLink + '" class="btn btn-primair">' + d.heroCta.primairTekst + '</a>' +
        '<a href="' + d.heroCta.secundairLink + '" class="btn btn-ghost">' + d.heroCta.secundairTekst + '</a>';

      // Stats
      const sb = document.getElementById('stats-balk');
      d.heroStats.forEach(function (s) {
        const div = document.createElement('div');
        div.className = 'stat';
        div.innerHTML = '<strong>' + s.getal + '</strong><span>' + s.label + '</span>';
        sb.appendChild(div);
      });

      // USP
      const uspGrid = document.getElementById('usp-grid');
      d.usp.forEach(function (u) {
        const div = document.createElement('div');
        div.className = 'usp-kaart';
        div.innerHTML = '<div class="usp-icoon">' + u.icoon + '</div><h3>' + u.titel + '</h3><p>' + u.tekst + '</p>';
        uspGrid.appendChild(div);
      });

      // Werkwijze
      document.getElementById('werkwijze-titel').textContent = d.werkwijzeTitel;
      document.getElementById('werkwijze-intro').textContent = '';
      const tl = document.getElementById('tijdlijn');
      d.stappen.forEach(function (s, i) {
        const div = document.createElement('div');
        div.className = 'stap';
        div.innerHTML =
          '<div class="stap-nr">' + (i + 1) + '</div>' +
          '<div class="stap-inhoud"><h3>' + s.titel + '</h3><p>' + s.tekst + '</p></div>';
        tl.appendChild(div);
      });

      // Portfolio preview (max 3)
      document.getElementById('portfolio-preview-titel').textContent = d.portfolioPreviewTitel;
      document.getElementById('portfolio-preview-intro').textContent = d.portfolioPreviewIntro;
      const pg = document.getElementById('portfolio-grid');
      C.portfolio.projecten.slice(0, 3).forEach(function (p) {
        const div = document.createElement('div');
        div.className = 'portfolio-kaart';
        const tagsHtml = p.tags.map(function (t) { return '<span class="tag">' + t + '</span>'; }).join('');
        div.innerHTML =
          '<div class="portfolio-beeld">' +
            (p.afbeelding
              ? '<img src="' + p.afbeelding + '" alt="' + p.naam + '" loading="lazy" decoding="async" width="600" height="400" />'
              : '<span class="foto-ph">FOTO: ' + p.naam + '</span>') +
          '</div>' +
          '<div class="portfolio-info">' +
            '<div class="tags">' + tagsHtml + '</div>' +
            '<h3>' + p.naam + '</h3>' +
            '<p class="portfolio-branche">' + p.branche + '</p>' +
            (p.url ? '<a href="' + p.url + '" target="_blank" rel="noopener" class="portfolio-link">Bekijk site →</a>' : '') +
          '</div>';
        pg.appendChild(div);
      });

      // CTA balk
      const cb = d.ctaBalk;
      document.getElementById('cta-balk').innerHTML =
        '<div class="wrap"><h2>' + cb.tekst + '</h2><a href="' + cb.knopLink + '" class="btn btn-wit">' + cb.knopTekst + '</a></div>';
    });
  </script>
</body>
</html>
